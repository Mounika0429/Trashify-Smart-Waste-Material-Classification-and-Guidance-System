<!DOCTYPE html>
<html>
<head>
    <title>{{ category }} Waste Suggestions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: row;
            padding: 20px;
            gap: 20px;
            background-color: black;
        }

        .left, .right {
            
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #f8f8f8;
        }
        .left{
            flex:2;
        }
        .right{
            flex:1;
        }

        iframe {
            margin-bottom: 15px;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="left">
        <h2>YouTube Videos on {{ category }}</h2>
        {% for video_id in suggestions.videos %}
            <iframe width="100%" height="500"
                    src="https://www.youtube.com/embed/{{ video_id }}"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
            </iframe>
        {% endfor %}
    </div>

    <div class="right">
        <h2>Helpful Websites</h2>
        <ul>
           {% for site in suggestions.websites %}
    <li><a href="{{ site.url }}" target="_blank">{{ site.name }}</a></li>
{% endfor %}

        </ul>
    </div>

</body>
</html>
