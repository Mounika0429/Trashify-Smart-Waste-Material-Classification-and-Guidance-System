<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trashify - Upload</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <nav class="navbar">
      <div class="logo">Trashify</div>
      <div class="nav-links">
        <button><a href="{{ url_for('home') }}">Home</a></button>
        <button><a href="{{ url_for('about') }}">About</a></button>
       <button> <a href="{{ url_for('home') }}#contact">Contact</a></button>
      </div>
    </nav>
  </header>

  <section class="upload-section">
    <div class="upload-card">
      <h1>Upload Your Waste Image</h1>
      <p>Get instant disposal guidance with AI.</p>
      <form action="/predict" method="post" enctype="multipart/form-data" class="upload-form">
        <label for="language">Select Language:</label>
        <select name="lang" id="language" required>
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="te">Telugu</option>
          <option value="ta">Tamil</option>
          <option value="kn">Kannada</option>
          <option value="ml">Malayalam</option>
          <option value="gu">Gujarati</option>
          <option value="bn">Bengali</option>
          <option value="mr">Marathi</option>
          <option value="ur">Urdu</option>
        </select>

        <input type="file" name="file" accept="image/*" required>

        <button type="submit" class="submit-btn">Classify Waste</button>
      </form>
    </div>
  </section>

  {% if prediction %}
  <section class="result-section">
    <div class="result-card">
      <h2>Prediction Result</h2>
      <p><strong>Category:</strong> {{ prediction }}</p>
      <img src="{{ url_for('static', filename='uploads/' + filename) }}" alt="Uploaded Waste Image" class="result-img">
    </div>
  </section>
  {% endif %}
</body>
</html>
